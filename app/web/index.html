<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ShelfEdit</title>
    <link rel="stylesheet" href="style.css" />
    <script src="qwebchannel.js"></script>
    <script src="app.js" defer></script>
</head>
<body>
    <div class="transport">
        <button id="play" class="play" disabled>Play</button>
        <span id="time" class="time">00:00.00 / 00:00.00</span>
        <span class="spacer"></span>
        <span id="project" class="project"></span>
        <span class="zoom">
            <button id="zoomOut" class="zbtn" title="Zoom out">−</button>
            <button id="zoomIn" class="zbtn" title="Zoom in">+</button>
        </span>
    </div>

    <div id="tl" class="tl">
        <div id="tlInner" class="tl-inner">
            <div class="tl-ruler-row">
                <div class="tl-corner"></div>
                <div id="ruler" class="tl-ruler"></div>
            </div>
            <div id="tracks" class="tl-tracks"></div>
            <div id="playhead" class="tl-playhead"><div class="tl-playhead-knob"></div></div>
        </div>
    </div>

    <div id="status" class="status">connecting…</div>
</body>
</html>
